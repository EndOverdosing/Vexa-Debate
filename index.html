<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>live debate</title>/>
<meta name="viewport"content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050505">
<meta name="apple-mobile-web-app-status-bar-style" content="#050505">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg:#080808;
--border:#1a1a1a;
--border-bright:#2a2a2a;
--text:#e8e8e8;
--muted:#444;
--a-line:#e8e8e8;
--b-line:#444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
background:var(--bg);
color:var(--text);
font-family:'IBM Plex Mono',monospace;
font-size:13px;
display:flex;
flex-direction:column;
align-items:center;
padding:3rem 1.2rem;
min-height:100vh
}
.wordmark{
font-size:9px;
letter-spacing:.35em;
text-transform:uppercase;
color:var(--muted);
margin-bottom:2.5rem
}
.wrap{width:100%;max-width:540px}
.input{
width:100%;
border:none;
border-bottom:1px solid var(--border-bright);
background:transparent;
color:var(--text);
font-family:'IBM Plex Mono',monospace;
padding:.45rem 0;
margin-bottom:1.1rem;
outline:none
}
.row{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:1.2rem;position:relative}
.button{
background:none;
border:none;
font-family:'IBM Plex Mono',monospace;
font-size:9px;
letter-spacing:.28em;
text-transform:uppercase;
cursor:pointer;
color:var(--text)
}
.button:disabled{opacity:.2}
.sep{color:#2a2a2a}
.selector{
font-size:12px;
color:var(--text);
cursor:pointer;
display:inline-flex;
gap:.4rem;
align-items:center;
user-select:none
}
.dropdown{
position:absolute;
top:1.8rem;
background:#080808;
border:1px solid var(--border);
display:none;
flex-direction:column;
min-width:150px;
z-index:5
}
.dropdown div{
padding:.35rem .6rem;
font-size:12px;
color:var(--muted);
cursor:pointer
}
.dropdown div:hover{color:var(--text)}
#chat{
margin-top:1rem;
display:flex;
flex-direction:column
}
.msg{
padding:.7rem 0;
border-bottom:1px solid var(--border)
}
.msg-a{
padding-left:.8rem;
border-left:1px solid var(--a-line);
margin-right:4rem
}
.msg-b{
padding-right:.8rem;
border-right:1px solid var(--b-line);
margin-left:4rem;
text-align:right
}
.name{
font-size:8px;
letter-spacing:.22em;
text-transform:uppercase;
color:var(--muted);
margin-bottom:.15rem
}
.round{
font-size:9px;
letter-spacing:.2em;
color:var(--muted);
margin:.5rem 0
}
.typing{
padding:.6rem 0;
display:flex;
gap:3px
}
.dot{
width:3px;
height:3px;
background:var(--muted);
border-radius:50%;
animation:blink 1s infinite
}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:.8}}
.status{
margin-top:1.4rem;
font-size:8px;
letter-spacing:.2em;
text-transform:uppercase;
color:var(--muted)
}
#customWrap{width:100%;margin-bottom:1rem}
</style>
</head>
<body>
<div class="wordmark">live debate</div>
<div class="wrap">
    <input class="input" id="topic" placeholder="enter topic">
    <div class="row">
        <div class="selector" id="styleBtn">style ▾</div>
        <div class="dropdown" id="styleMenu">
            <div data-style="casual">casual</div>
            <div data-style="logic">logical</div>
            <div data-style="philosophical">philosophical</div>
            <div data-style="sarcastic">sarcastic</div>
            <div data-style="internet">internet</div>
            <div data-style="custom">custom</div>
        </div>
        <div class="selector" id="modeBtn">mode ▾</div>
        <div class="dropdown" id="modeMenu">
            <div data-mode="ai-ai">AI vs AI</div>
            <div data-mode="human-ai">Human vs AI</div>
        </div>
        <div class="selector" id="lengthBtn">length ▾</div>
        <div class="dropdown" id="lengthMenu">
            <div data-length="short">short</div>
            <div data-length="medium">medium</div>
            <div data-length="long">long</div>
        </div>
    </div>
    
    <div class="row" id="customWrap" style="display:none">
        <input class="input" id="customStyle" placeholder="describe custom style">
    </div>

    <div class="row">
        <button class="button" id="random">random topic</button>
        <span class="sep">/</span>
        <button class="button" id="start">start</button>
        <span class="sep">/</span>
        <button class="button" id="stop" disabled>stop</button>
    </div>

    <div id="chat"></div>
    <div class="status" id="status">ready</div>
    <div style="height: 80px;"></div>
</div>

<div id="inputBar" style="display:none; position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; border-top: 1px solid #1a1a1a; padding: 10px; z-index: 100;">
    <div style="max-width: 540px; margin: 0 auto; display: flex; gap: 10px;">
        <input type="text" id="humanInput" placeholder="Type your argument..." style="flex: 1; background: transparent; border: 1px solid #2a2a2a; color: #e8e8e8; font-family: 'IBM Plex Mono', monospace; padding: 8px; outline: none;">
        <button id="sendBtn" class="button" style="border: 1px solid #2a2a2a; padding: 0 15px;">SEND</button>
    </div>
</div>

<script>
const API = "https://vexa-ai.vercel.app"

const topicInput = document.getElementById("topic")
const startBtn = document.getElementById("start")
const stopBtn = document.getElementById("stop")
const randomBtn = document.getElementById("random")
const chat = document.getElementById("chat")
const statusEl = document.getElementById("status")
const styleBtn = document.getElementById("styleBtn")
const styleMenu = document.getElementById("styleMenu")
const modeBtn = document.getElementById("modeBtn")
const modeMenu = document.getElementById("modeMenu")
const lengthBtn = document.getElementById("lengthBtn")
const lengthMenu = document.getElementById("lengthMenu")
const customWrap = document.getElementById("customWrap")
const customStyle = document.getElementById("customStyle")

const inputBar = document.getElementById("inputBar")
const humanInputField = document.getElementById("humanInput")
const sendBtn = document.getElementById("sendBtn")

let style = "casual", mode = "ai-ai", length = "medium", running = false, exchanges = 0
const LENGTHS = { short: 6, medium: 10, long: 12 }
const STYLES = {
    casual: "casual argument with real points",
    logic: "logical debate with reasoning",
    philosophical: "philosophical discussion",
    sarcastic: "sarcastic debate still making points",
    internet: "internet comment style debate"
}

function clean(t) { return t.replace(/\[model:[^\]]*\]/gi, "").replace(/[*_`>#~\-]/g, "").trim() }

function addMsg(side, text, round) {
    const el = document.createElement("div")
    if (round) {
        const r = document.createElement("div")
        r.className = "round"
        r.textContent = round
        chat.appendChild(r)
    }
    el.className = "msg msg-" + side
    el.innerHTML = '<div class="name">' + (side === 'a' ? 'PRO' : 'CON') + '</div>' + clean(text)
    chat.appendChild(el)
    window.scrollTo(0, document.body.scrollHeight)
}

function addTyping() {
    const el = document.createElement("div")
    el.id = "typing"
    el.className = "typing"
    el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>'
    chat.appendChild(el)
}

function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove() }

async function call(messages) {
    for (const m of ["toolbaz-v4.5-fast", "gemini-2.5-flash", "gpt-4o-mini"]) {
        try {
            const r = await fetch(API + "/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ model: m, messages }) })
            const d = await r.json()
            const txt = d.message?.content || d.text || d.content
            if (txt) return clean(txt)
        } catch {}
    }
    return "Connection error. Re-trying..."
}

async function randomTopic() {
    statusEl.textContent = "generating topic..."
    const t = await call([{ role: "user", content: "generate one short controversial debate topic" }])
    topicInput.value = t
    statusEl.textContent = "ready"
}

let histA = [], histB = [], history = []

function roundLabel(i) {
    const total = LENGTHS[length]
    if (i === 0) return "Opening Statement"
    if (i >= total - 1) return "Closing Argument"
    return "Rebuttal " + Math.floor(i / 2 + 1)
}

async function turn(side, humanInput = null) {
    let msg
    if (humanInput) {
        msg = humanInput
    } else {
        addTyping()
        msg = await call(side === "a" ? histA : histB)
        removeTyping()
    }
    
    addMsg(side, msg, roundLabel(exchanges))
    history.push(side.toUpperCase() + ": " + msg)
    
    const roleA = side === "a" ? "assistant" : "user"
    const roleB = side === "b" ? "assistant" : "user"
    histA.push({ role: roleA, content: msg })
    histB.push({ role: roleB, content: msg })
}

function getHumanResponse() {
    return new Promise((resolve) => {
        inputBar.style.display = "block"
        humanInputField.focus()
        
        const handleSend = () => {
            const val = humanInputField.value.trim()
            if (val) {
                inputBar.style.display = "none"
                humanInputField.value = ""
                sendBtn.removeEventListener("click", handleSend)
                resolve(val)
            }
        }
        
        sendBtn.addEventListener("click", handleSend)
        humanInputField.onkeydown = (e) => { if (e.key === "Enter") handleSend() }
    })
}

async function run() {
    chat.innerHTML = ""
    histA = []; histB = []; history = []
    running = true; exchanges = 0
    startBtn.disabled = true; stopBtn.disabled = false
    
    const topic = topicInput.value.trim()
    if (!topic) { statusEl.textContent = "enter topic first"; startBtn.disabled = false; return; }
    
    const stylePrompt = style === "custom" ? customStyle.value : STYLES[style]
    histA = [{ role: "system", content: "Topic: " + topic + ". You AGREE. Style: " + stylePrompt + ". Short replies." }]
    histB = [{ role: "system", content: "Topic: " + topic + ". You DISAGREE. Style: " + stylePrompt + ". Short replies." }]

    while (running && exchanges < LENGTHS[length]) {
        if (mode === "human-ai") {
            statusEl.textContent = "your turn (PRO)"
            const humanMsg = await getHumanResponse()
            await turn("a", humanMsg)
        } else {
            statusEl.textContent = "AI (PRO) typing..."
            await turn("a")
        }
        exchanges++
        
        if (!running || exchanges >= LENGTHS[length]) break

        statusEl.textContent = "AI (CON) typing..."
        await turn("b")
        exchanges++
    }

    running = false
    statusEl.textContent = "debate finished. judging..."
    const winPrompt = "Based on this debate, who had stronger points? Topic: " + topic + "\n" + history.join("\n") + "\nPick a winner (PRO or CON) and give a 1-sentence reason."
    const result = await call([{ role: "user", content: winPrompt }])
    statusEl.textContent = result
    startBtn.disabled = false
    stopBtn.disabled = true
}

startBtn.onclick = run
stopBtn.onclick = () => { running = false; statusEl.textContent = "stopped"; startBtn.disabled = false; inputBar.style.display = "none"; }
randomBtn.onclick = randomTopic

function setupDropdown(btn, menu, setFunc) {
    btn.onclick = (e) => { e.stopPropagation(); menu.style.display = menu.style.display === "flex" ? "none" : "flex" }
    menu.querySelectorAll("div").forEach(opt => {
        opt.onclick = () => {
            const val = opt.dataset.value || opt.dataset.style || opt.dataset.mode || opt.dataset.length
            setFunc(val)
            menu.style.display = "none"
            btn.textContent = opt.textContent + " ▾"
            customWrap.style.display = (opt.dataset.style === "custom") ? "block" : "none"
        }
    })
}
document.addEventListener("click", () => {
    [styleMenu, modeMenu, lengthMenu].forEach(m => m.style.display = "none")
})
setupDropdown(styleBtn, styleMenu, v => style = v)
setupDropdown(modeBtn, modeMenu, v => mode = v)
setupDropdown(lengthBtn, lengthMenu, v => length = v)
</script>
</body>
</html>
